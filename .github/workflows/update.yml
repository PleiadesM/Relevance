name: Update Relevance

on:
  workflow_dispatch: {}
  schedule:
    # All at :17 (dodges top-of-hour scheduler congestion). Which one actually
    # runs is picked by the NEWSDASH_UPDATE_FREQ repo Variable via the
    # job-level `if:` below — unmatched schedules skip before any runner spins
    # up, so they cost zero billed minutes.
    # Actions minutes/month at ~2.5 min/run: 2h ≈ 900, 3x ≈ 225, daily ≈ 75.
    # Private repos get 2000 free minutes/month — set the variable to 3x or
    # daily to stay well under. workflow_dispatch always runs regardless.
    - cron: "17 */2 * * *"      # 2h (default)
    - cron: "17 5,13,21 * * *"  # 3x
    - cron: "17 13 * * *"       # daily

concurrency:
  group: update-newsdash-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    # Run only the schedule matching NEWSDASH_UPDATE_FREQ (unset/empty == 2h).
    # A job-level skip spins up NO runner, so unmatched crons bill 0 minutes.
    # workflow_dispatch (manual) always runs. The 13:17 UTC overlap of the 3x
    # and daily crons — and the even-hour overlap with 2h — is fine: exactly
    # one branch matches per run, the rest skip at zero cost.
    if: >-
      github.event_name != 'schedule' ||
      (github.event.schedule == '17 */2 * * *'     && (vars.NEWSDASH_UPDATE_FREQ == '' || vars.NEWSDASH_UPDATE_FREQ == '2h')) ||
      (github.event.schedule == '17 5,13,21 * * *' && vars.NEWSDASH_UPDATE_FREQ == '3x') ||
      (github.event.schedule == '17 13 * * *'      && vars.NEWSDASH_UPDATE_FREQ == 'daily')
    timeout-minutes: 12
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare optional OPML
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          if [ -n "$FOLLOW_OPML_B64" ]; then
            mkdir -p feeds
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
            echo "Loaded feeds/follow.opml from FOLLOW_OPML_B64 secret"
          fi

      - name: Build data
        env:
          # Policy: keys live in Secrets; tuning lives in config files;
          # Variables exist only as kill switches (<ID>_ENABLED=0).
          NEWSDASH_PASSPHRASE: ${{ secrets.NEWSDASH_PASSPHRASE }}
          # Per-source capability URLs (SRC_<ID>_URL); only ^SRC_ keys are read
          # (filtered in config.py); Actions masks secret values in logs.
          NEWSDASH_SOURCE_SECRETS: ${{ toJSON(secrets) }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SMITHSONIAN_API_KEY: ${{ secrets.SMITHSONIAN_API_KEY }}
          CONTACT_MAILTO: ${{ vars.CONTACT_MAILTO }}
          RSS_MAX_FEEDS: ${{ vars.RSS_MAX_FEEDS }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_SUMMARY_ENABLED: ${{ vars.LLM_SUMMARY_ENABLED }}
          TODAYS_IMAGE_ENABLED: ${{ vars.TODAYS_IMAGE_ENABLED }}
        run: python scripts/build.py --output-dir data

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage the whole data dir so new output files can never be
          # silently dropped by a stale filename whitelist.
          git add data/
          # Self-check: anything under data/ still unstaged means a bug —
          # fail loudly instead of green-but-stale runs.
          if [ -n "$(git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]' || true)" ]; then
            echo "::error::Generated files under data/ were not staged:"
            git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]'
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update newsdash data"
          # Race guard against setup-from-issue config commits.
          git pull --rebase --autostash
          git push
