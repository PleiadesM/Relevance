name: Apply setup from issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  apply:
    # Owner guard: only the repository owner's setup issues are applied —
    # drive-by issues on public repos must never rewrite config.
    if: >-
      (contains(github.event.issue.labels.*.name, 'newsdash-setup') ||
       contains(github.event.issue.labels.*.name, 'newsdash-source')) &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write issue body to a file (injection guard)
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: printf '%s' "$ISSUE_BODY" > "$RUNNER_TEMP/issue-body.md"

      - name: Apply preferences
        id: apply
        continue-on-error: true
        run: |
          python scripts/apply_issue_setup.py \
            --body-file "$RUNNER_TEMP/issue-body.md" \
            --comment-out "$RUNNER_TEMP/comment.md" \
            --repo "${{ github.repository }}"

      - name: Commit config
        if: steps.apply.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/
          if git diff --cached --quiet; then
            echo "No config changes"
          else
            git commit -m "chore(setup): apply preferences from issue #${{ github.event.issue.number }}"
            git pull --rebase --autostash
            git push
          fi

      - name: Trigger rebuild
        if: steps.apply.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        # Bot pushes don't retrigger workflows by design; dispatch explicitly.
        run: gh workflow run update.yml --ref "${{ github.ref_name }}"

      # Set the NEWSDASH_UPDATE_FREQ repo Variable to the cadence chosen in the
      # setup form (uses the permissions.actions:write granted above). Runs only
      # when the parser emitted a non-empty update_freq. Never fails the
      # workflow: if the API is unavailable, it appends a manual-path note to the
      # result comment instead. The value is re-validated against the whitelist
      # here too — issue-form input is untrusted (the API can POST arbitrary
      # body text even though the dropdown constrains the UI).
      - name: Set update-frequency variable
        if: steps.apply.outcome == 'success' && steps.apply.outputs.update_freq != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FREQ: ${{ steps.apply.outputs.update_freq }}
        run: |
          case "$FREQ" in
            2h|3x|daily) ;;
            *) echo "::warning::ignoring unexpected update frequency"; exit 0 ;;
          esac
          if gh api -X PATCH "repos/${GITHUB_REPOSITORY}/actions/variables/NEWSDASH_UPDATE_FREQ" \
                -f name=NEWSDASH_UPDATE_FREQ -f value="$FREQ" \
             || gh api -X POST "repos/${GITHUB_REPOSITORY}/actions/variables" \
                -f name=NEWSDASH_UPDATE_FREQ -f value="$FREQ"; then
            echo "Set NEWSDASH_UPDATE_FREQ=$FREQ"
          else
            {
              printf '\n> ⚠️ **Couldn'"'"'t set the update-frequency variable automatically.** '
              printf 'Set it yourself: Settings → Secrets and variables → Actions → Variables → '
              printf 'New variable, name `NEWSDASH_UPDATE_FREQ`, value `%s`. ' "$FREQ"
              printf '未能自动设置更新频率变量，请手动前往 Settings → Secrets and variables → Actions → '
              printf 'Variables 新建变量 `NEWSDASH_UPDATE_FREQ`，值填 `%s`。\n' "$FREQ"
            } >> "$RUNNER_TEMP/comment.md"
          fi

      - name: Comment back
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body-file "$RUNNER_TEMP/comment.md"

      - name: Close issue on success
        if: steps.apply.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --reason completed
